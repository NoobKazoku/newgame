interface:
  display_name: "GitHub PR Review"
  short_description: "Inspect the current PR and AI review findings"
  default_prompt: "Use $gframework-pr-review to inspect the current branch PR through the GitHub API, resolve the target repository from git remote configuration, prioritize unresolved review threads on the latest head commit from supported AI reviewers such as CodeRabbit and greptile-apps, and summarize failed checks or failed tests."
